name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  connection:
    name: Check VPS connection
    runs-on: ubuntu-latest

    steps:
      - name: Настроить SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_HOST_KEY: ${{ secrets.VPS_HOST_KEY }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s %s\n' "$VPS_HOST" "$VPS_HOST_KEY" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Проверить подключение
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh \
            -i ~/.ssh/deploy_key \
            -o BatchMode=yes \
            "$VPS_USER@$VPS_HOST" \
            'whoami && hostname && docker ps --format "table {{.Names}}\t{{.Status}}"'